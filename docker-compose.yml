version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: nextcore_mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: nextcore_auth

  redis:
    image: redis:7-alpine
    container_name: nextcore_redis
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: nextcore_rabbitmq
    ports:
      - '5672:5672'    # AMQP
      - '15672:15672'  # Panel de administración web
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data: